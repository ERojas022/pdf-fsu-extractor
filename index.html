<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Extractor FSU</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    padding:30px;
}

h1{
    color:#0b5ed7;
}

button{
    background:#0b5ed7;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    border-radius:5px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th{
    background:#0b5ed7;
    color:white;
}

td,th{
    border:1px solid #ccc;
    padding:8px;
}

#estado{
    margin-top:15px;
    color:green;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>Extractor de Información FSU</h1>

<input type="file" id="pdfFile" accept="application/pdf">

<button onclick="leerPDF()">Procesar PDF</button>

<p id="prueba"></p>

<div id="estado"></div>

<table>
<thead>
<tr>
<th>Tipo</th>
<th>Código</th>
<th>Número</th>
<th>Fecha</th>
<th>DNI</th>
<th>Nombre</th>
</tr>
</thead>

<tbody id="tabla">
</tbody>

</table>


<script>

async function leerPDF(){
    document.getElementById("prueba").innerHTML="Botón funcionando";

    const archivo = document.getElementById("pdfFile").files[0];

    if(!archivo){
        alert("Seleccione un PDF primero");
        return;
    }

    document.getElementById("estado").innerHTML="Leyendo PDF...";

    const lector = new FileReader();

    lector.onload = async function(){

        const pdf = await pdfjsLib.getDocument({
            data: new Uint8Array(this.result)
        }).promise;


        let texto="";


        for(let i=1;i<=pdf.numPages;i++){

            const pagina = await pdf.getPage(i);

            const contenido = await pagina.getTextContent();

            contenido.items.forEach(item=>{
                texto += item.str + " ";
            });

        }


        //alert(texto.substring(0,1500));
extraerDatos(texto);

    };


    lector.readAsArrayBuffer(archivo);

}
function extraerDatos(texto){

    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    // Une líneas partidas por el PDF
    texto = texto.replace(/\n/g, " ");
    texto = texto.replace(/\s+/g, " ");


    let patron = /(FSU|S100)\s+(\d+)\s+(\d+)\s+(\d{2}-\d{2}-\d{4})\s+(\d+)-?([A-ZÁÉÍÓÚÑ ]+)/g;


    let encontrado = false;
    let cantidad = 0;

    let datos;


    while((datos = patron.exec(texto)) !== null){

        encontrado = true;
        cantidad++;

        let tipo = datos[1];
        let codigo = datos[2];
        let numero = datos[3];
        let fecha = datos[4];
        let dni = datos[5];
        let nombre = datos[6].trim();


        let fila = `
        <tr>
            <td>${tipo}</td>
            <td>${codigo}</td>
            <td>${numero}</td>
            <td>${fecha}</td>
            <td>${dni}</td>
            <td>${nombre}</td>
        </tr>`;


        tabla.innerHTML += fila;

    }


    if(encontrado){

        document.getElementById("estado").innerHTML =
        "Se encontraron " + cantidad + " registros";

    }else{

        document.getElementById("estado").innerHTML =
        "No se encontraron registros";

    }

}


</script>

</body>
</html>
