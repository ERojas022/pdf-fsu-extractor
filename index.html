<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Extractor FSU S100</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>


<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

button{
background:#0b5ed7;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th{
background:#0b5ed7;
color:white;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

</style>


</head>


<body>


<h1>Extractor FSU / S100</h1>


<input type="file" id="pdfFile" accept="application/pdf">


<br><br>


<button onclick="leerPDF()">Procesar PDF</button>

<button onclick="exportarExcel()">Descargar Excel</button>


<p id="estado"></p>


<table>


<thead>

<tr>
<th>Tipo</th>
<th>Código</th>
<th>Número</th>
<th>Fecha</th>
<th>DNI</th>
<th>Nombre</th>
</tr>

</thead>


<tbody id="tabla">

</tbody>


</table>



<script>


async function leerPDF(){


let archivo=document.getElementById("pdfFile").files[0];


if(!archivo){

alert("Seleccione un PDF");

return;

}


document.getElementById("estado").innerHTML="Leyendo PDF...";


let lector=new FileReader();



lector.onload=async function(){


let pdf=await pdfjsLib.getDocument({

data:new Uint8Array(this.result)

}).promise;



let texto="";



for(let i=1;i<=pdf.numPages;i++){


let pagina=await pdf.getPage(i);


let contenido=await pagina.getTextContent();



contenido.items.forEach(item=>{

    texto += item.str + "\n";

});


}



extraerDatos(texto);



};



lector.readAsArrayBuffer(archivo);


}

function extraerDatos(texto){


let tabla=document.getElementById("tabla");

tabla.innerHTML="";


// Limpieza del texto
texto = texto.replace(/\r/g,"");


// Detecta cada bloque desde FSU hasta antes del siguiente FSU
let bloques = texto.split(/(?=FSU\s+\d+)/);


let contador=0;


bloques.forEach(bloque=>{


    let datos = bloque.match(
    
    /FSU\s+(\d+)\s+(\d+)\s+(\d{2}-\d{2}-\d{4})\s+(\d+)-([\s\S]*?)(?=\nFSU|\n*$)/
    
    );


    if(datos){


        contador++;


        let codigo = datos[1];

        let numero = datos[2];

        let fecha = datos[3];

        let dni = datos[4];

        let nombre = datos[5]
        .replace(/\n/g," ")
        .replace(/\s+/g," ")
        .trim();



        tabla.innerHTML += `

        <tr>

        <td>FSU</td>

        <td>${codigo}</td>

        <td>${numero}</td>

        <td>${fecha}</td>

        <td>${dni}</td>

        <td>${nombre}</td>

        </tr>

        `;


    }


});



document.getElementById("estado").innerHTML =
"Registros encontrados: "+contador;


}







function exportarExcel(){


let tabla=document.querySelector("table");


let libro=XLSX.utils.table_to_book(tabla,{

sheet:"Datos"

});


XLSX.writeFile(libro,"resultado_FSU_S100.xlsx");


}



</script>


</body>

</html>
